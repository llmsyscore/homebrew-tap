name: Formula CI

# Symlinks the checkout in as the live tap so audit/install exercise THIS
# revision, then runs the shared install-test composite actions — agent and
# control plane as parallel suites, on macOS and Linux.

on:
  push:
    branches: [main]
    paths: ["Formula/**", ".github/**"]
  pull_request:
    paths: ["Formula/**", ".github/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formula-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        suite: [agent, control-plane]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-brew-ci
        with:
          link-checkout: "true"
      - name: Audit + style
        run: |
          brew style llmsyscore/tap
          brew audit llmsyscore/tap/llm-systems-agent \
                     llmsyscore/tap/llm-systems-manager \
                     llmsyscore/tap/llm-systems-alarm-engine
      - if: matrix.suite == 'agent'
        uses: ./.github/actions/install-test
        with:
          formula: llmsyscore/tap/llm-systems-agent
      - if: matrix.suite == 'control-plane'
        uses: ./.github/actions/manager-install-test
