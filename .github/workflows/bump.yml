name: Bump formulas to latest release

# Compares the formulas' pinned tag to the latest llm-systems-manager
# release; on drift, rewrites every url + per-asset sha256 across all
# formulas (.github/scripts/bump-formulas.py), re-runs the full install
# tests (macOS + Linux, agent + control plane) against the rewritten
# formulas, and only then opens a bump PR. Broken releases never land.
#
# main's ruleset forbids direct pushes (PR + checks + signatures required),
# so the bump lands as a PR a maintainer merges, not a push to main.

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changed: ${{ steps.v.outputs.changed }}
      latest: ${{ steps.v.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest release vs current pin
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest="$(gh api repos/llmsyscore/llm-systems-manager/releases/latest -q .tag_name)"
          current="$(sed -n 's|.*releases/download/\(v[0-9][^/]*\)/.*|\1|p' Formula/llm-systems-agent.rb | head -n1)"
          [ -n "$latest" ] && [ -n "$current" ]
          echo "$latest" | grep -Eq '^v[0-9][0-9A-Za-z.-]*$'
          {
            echo "latest=$latest"
            echo "current=$current"
            echo "changed=$([ "$latest" != "$current" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"
          echo "pin: $current, latest release: $latest"
      - name: Rewrite formula urls + sha256s
        if: steps.v.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          python3 .github/scripts/bump-formulas.py "$LATEST"
          git diff --stat
      - name: Upload rewritten formulas
        if: steps.v.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: formulas
          path: Formula/
          if-no-files-found: error

  verify:
    needs: rewrite
    if: needs.rewrite.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        suite: [agent, control-plane]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: formulas
          path: Formula/
      - uses: ./.github/actions/setup-brew-ci
        with:
          link-checkout: "true"
      - if: matrix.suite == 'agent'
        uses: ./.github/actions/install-test
        with:
          formula: llmsyscore/tap/llm-systems-agent
      - if: matrix.suite == 'control-plane'
        uses: ./.github/actions/manager-install-test

  open-pr:
    needs: [rewrite, verify]
    if: needs.rewrite.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: formulas
          path: Formula/
      # The ruleset requires verified signatures on EVERY branch; a bot git
      # commit is unsigned. createCommitOnBranch commits are signed by GitHub,
      # so the bump lands via the API. LATEST is release-API-derived and
      # regex-validated in rewrite; values reach commands via env only.
      - name: Open bump PR (signed API commit)
        env:
          LATEST: ${{ needs.rewrite.outputs.latest }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          branch="bump/${LATEST}"
          enc="${branch//\//%2F}"
          commit_formulas() {
            # $1 = expectedHeadOid to commit on top of
            payload="$(jq -n --arg repo "$GITHUB_REPOSITORY" --arg branch "$branch" --arg oid "$1" \
              --arg msg "formulas: bump to ${LATEST}" \
              --arg agent "$(base64 -w0 Formula/llm-systems-agent.rb)" \
              --arg ae "$(base64 -w0 Formula/llm-systems-alarm-engine.rb)" \
              --arg mgr "$(base64 -w0 Formula/llm-systems-manager.rb)" \
              '{query: "mutation($input: CreateCommitOnBranchInput!){ createCommitOnBranch(input:$input){ commit { oid } } }",
                variables: {input: {branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                  expectedHeadOid: $oid, message: {headline: $msg},
                  fileChanges: {additions: [
                    {path: "Formula/llm-systems-agent.rb", contents: $agent},
                    {path: "Formula/llm-systems-alarm-engine.rb", contents: $ae},
                    {path: "Formula/llm-systems-manager.rb", contents: $mgr}]}}}}')"
            curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -X POST -d "$payload" https://api.github.com/graphql \
              | jq -re '.data.createCommitOnBranch.commit.oid'
          }
          if gh pr view "$branch" --json url -q .url 2>/dev/null; then
            # Open PR already tracks this branch — commit on its current head
            # (deleting the ref would close the PR).
            head_oid="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${enc}" -q .object.sha)"
            oid="$(commit_formulas "$head_oid")" || { echo "::error::createCommitOnBranch failed"; exit 1; }
            echo "updated existing bump PR with signed commit $oid"
            exit 0
          fi
          main_oid="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" -q .object.sha)"
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${enc}" >/dev/null 2>&1 || true
          gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/heads/${branch}" -f sha="$main_oid" >/dev/null
          oid="$(commit_formulas "$main_oid")" || { echo "::error::createCommitOnBranch failed"; exit 1; }
          echo "signed bump commit: $oid"
          gh pr create --base main --head "$branch" \
            --title "formulas: bump to ${LATEST}" \
            --body "Automated bump to the latest llm-systems-manager release (\`${LATEST}\`). URLs + sha256s rewritten by \`bump-formulas.py\`; the full macOS+Linux x agent+control-plane install-test matrix passed in this run's verify job. Merge to publish (maintainer \`gh pr merge --squash --admin\`)." \
          || {
            echo "::warning::Could not auto-create the PR (Actions-created PRs may be disabled)."
            echo "Open it from: https://github.com/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
          }
