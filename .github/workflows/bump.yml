name: Bump formula to latest release

# Compares the formula's pinned tag to the latest llm-systems-manager
# release; on drift, rewrites url+sha256, re-runs the install test against
# the rewritten formula, and only then pushes. Broken releases never land.

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest release vs current pin
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest="$(gh api repos/llmsyscore/llm-systems-manager/releases/latest -q .tag_name)"
          current="$(sed -n 's|.*releases/download/\(v[0-9][^/]*\)/.*|\1|p' Formula/llm-systems-agent.rb)"
          [ -n "$latest" ] && [ -n "$current" ]
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "pin: $current, latest release: $latest"
      - name: Rewrite formula url + sha256
        if: steps.v.outputs.latest != steps.v.outputs.current
        env:
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          sha_url="https://github.com/llmsyscore/llm-systems-manager/releases/download/$LATEST/llm-systems-agent-macos-arm64.tar.gz.sha256"
          sha="$(curl -fsSL "$sha_url" | awk '{print $1}')"
          echo "$sha" | grep -Eq '^[0-9a-f]{64}$'
          python3 - "$LATEST" "$sha" <<'PY'
          import re, sys
          tag, sha = sys.argv[1], sys.argv[2]
          p = "Formula/llm-systems-agent.rb"
          s = open(p).read()
          s = re.sub(r"releases/download/v[^/]+/", f"releases/download/{tag}/", s)
          s = re.sub(r'(?m)^(\s*sha256 ")[0-9a-f]{64}(")$', rf"\g<1>{sha}\g<2>", s)
          open(p, "w").write(s)
          PY
          git diff --stat
      - name: Link checkout as the live tap
        if: steps.v.outputs.latest != steps.v.outputs.current
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/llmsyscore"
          ln -sfn "$PWD" "$(brew --repository)/Library/Taps/llmsyscore/homebrew-tap"
      - uses: ./.github/actions/install-test
        if: steps.v.outputs.latest != steps.v.outputs.current
        with:
          formula: llmsyscore/tap/llm-systems-agent
      - name: Commit + push the bump
        if: steps.v.outputs.latest != steps.v.outputs.current
        env:
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/llm-systems-agent.rb
          git commit -m "llm-systems-agent: bump to $LATEST"
          git push
