name: Bump formulas to latest release

# Compares the formulas' pinned tag to the latest llm-systems-manager
# release; on drift, rewrites every url + per-asset sha256 across all
# formulas (.github/scripts/bump-formulas.py), re-runs the full install
# tests (macOS + Linux, agent + control plane) against the rewritten
# formulas, and only then opens a bump PR. Broken releases never land.
#
# main's ruleset forbids direct pushes (PR + checks + signatures required),
# so the bump lands as a PR a maintainer merges, not a push to main.

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changed: ${{ steps.v.outputs.changed }}
      latest: ${{ steps.v.outputs.latest }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest release vs current pin
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest="$(gh api repos/llmsyscore/llm-systems-manager/releases/latest -q .tag_name)"
          current="$(sed -n 's|.*releases/download/\(v[0-9][^/]*\)/.*|\1|p' Formula/llm-systems-agent.rb | head -n1)"
          [ -n "$latest" ] && [ -n "$current" ]
          echo "$latest" | grep -Eq '^v[0-9][0-9A-Za-z.-]*$'
          {
            echo "latest=$latest"
            echo "current=$current"
            echo "changed=$([ "$latest" != "$current" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"
          echo "pin: $current, latest release: $latest"
      - name: Rewrite formula urls + sha256s
        if: steps.v.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.v.outputs.latest }}
        run: |
          python3 .github/scripts/bump-formulas.py "$LATEST"
          git diff --stat
      - name: Upload rewritten formulas
        if: steps.v.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: formulas
          path: Formula/
          if-no-files-found: error

  verify:
    needs: rewrite
    if: needs.rewrite.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        suite: [agent, control-plane]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: formulas
          path: Formula/
      - uses: ./.github/actions/setup-brew-ci
        with:
          link-checkout: "true"
      - if: matrix.suite == 'agent'
        uses: ./.github/actions/install-test
        with:
          formula: llmsyscore/tap/llm-systems-agent
      - if: matrix.suite == 'control-plane'
        uses: ./.github/actions/manager-install-test

  open-pr:
    needs: [rewrite, verify]
    if: needs.rewrite.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: formulas
          path: Formula/
      # main's ruleset forbids direct pushes, so land the bump as a PR a
      # maintainer merges. LATEST is release-API-derived + regex-validated in
      # the rewrite job; passed via env, never interpolated into a command.
      - name: Open bump PR
        env:
          LATEST: ${{ needs.rewrite.outputs.latest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="bump/${LATEST}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Formula/
          git commit -m "formulas: bump to ${LATEST}"
          git push --force-with-lease -u origin "$branch"
          if gh pr view "$branch" --json url -q .url 2>/dev/null; then
            echo "PR already open for $branch — updated in place."
            exit 0
          fi
          gh pr create --base main --head "$branch" \
            --title "formulas: bump to ${LATEST}" \
            --body "Automated bump to the latest llm-systems-manager release (\`${LATEST}\`). URLs + sha256s rewritten by \`bump-formulas.py\`; the full macOS+Linux × agent+control-plane install-test matrix passed in this run's verify job. Merge to publish — main's ruleset needs a maintainer merge (\`gh pr merge --squash --admin\`)." \
          || {
            echo "::warning::Could not auto-create the PR (Actions-created PRs may be disabled)."
            echo "Open it from: https://github.com/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
          }
