name: Control-plane install + service smoke test
description: >-
  Install the llm-systems-manager + llm-systems-alarm-engine formulas, boot the
  manager then the alarm engine under brew services, assert both /health
  endpoints, then uninstall clean. Linux callers must have run the
  setup-brew-ci action first.
runs:
  using: composite
  steps:
    - name: Install formulas + seeded config
      shell: bash
      run: |
        brew install --formula llmsyscore/tap/llm-systems-manager \
                               llmsyscore/tap/llm-systems-alarm-engine
        cfg="$(brew --prefix)/etc/llm-systems-manager/llm-systems.toml"
        test -f "$cfg"
        grep -q '^ingest_token = "REPLACE_ME"' "$cfg" && { echo "seeder left REPLACE_ME"; exit 1; }
        grep -q '^log_dir = "'"$(brew --prefix)"'/var/log/llm-systems-manager"' "$cfg"

    - name: Keg payload audit (no dev/CI files — #437)
      shell: bash
      run: |
        rc=0
        for keg in llm-systems-manager llm-systems-alarm-engine; do
          lib="$(brew --prefix)/opt/$keg/libexec"
          bad="$(find "$lib" -path "$lib/venv" -prune -o -print \
            | grep -E '/(docker|design|devel|docs/screenshots|tools/packaging|tests|\.github)(/|$)|docker-compose\.yml|\.dockerignore|/ci-[a-z0-9-]+\.sh$' || true)"
          if [ -n "$bad" ]; then
            echo "dev/CI files shipped in the $keg keg:"; echo "$bad"; rc=1
          fi
        done
        exit "$rc"

    - name: InfluxDB provisioning via llm-systems-influx-setup (#447)
      shell: bash
      run: |
        if ! command -v llm-systems-influx-setup >/dev/null 2>&1; then
          echo "skip: llm-systems-influx-setup not installed (pre-v1.0.8 pin)"; exit 0
        fi
        # Homebrew's plain influxdb formula is InfluxDB 3.x (no v2 API);
        # helpers before the influxdb@2 retarget can't provision it — skip.
        if ! grep -q 'influxdb@2' "$(command -v llm-systems-influx-setup)"; then
          echo "skip: helper predates the influxdb@2 retarget (pre-v1.0.11 pin)"; exit 0
        fi
        brew install influxdb@2 influxdb-cli
        out="$(llm-systems-influx-setup)"
        echo "$out"
        echo "$out" | grep -q "RECORD THIS NOW"
        cfg="$(brew --prefix)/etc/llm-systems-manager/llm-systems.toml"
        grep -q '^metrics        = "REPLACE_ME"' "$cfg" && { echo "metrics token not written"; exit 1; }
        grep -q '^metrics_rollup = "REPLACE_ME"' "$cfg" && { echo "rollup token not written"; exit 1; }
        adm="$(sed -n 's/^admin    = "\(.*\)"$/\1/p' "$cfg" | head -n 1)"
        [ -n "$adm" ] || { echo "admin operator token not written"; exit 1; }
        # DB really provisioned — both buckets visible with the operator token
        # the helper wrote into the config.
        INFLUX_TOKEN="$adm" influx bucket list --org llm-systems-manager --hide-headers > /tmp/buckets.txt
        cat /tmp/buckets.txt
        grep -qw 'alarm_engine_metrics' /tmp/buckets.txt
        grep -qw 'alarm_engine_metrics_rollup' /tmp/buckets.txt
        # Secrets file stays 0600.
        perms="$(stat -c '%a' "$cfg" 2>/dev/null || stat -f '%Lp' "$cfg")"
        [ "$perms" = "600" ] || { echo "config perms $perms != 600"; exit 1; }
        # Second run is an idempotent no-op.
        out2="$(llm-systems-influx-setup)"
        echo "$out2" | grep -q "nothing to do"

    - name: Manager serves /health (first boot creates CA + AE cert)
      shell: bash
      run: |
        brew services start llm-systems-manager
        ok=""
        for _ in $(seq 1 45); do
          if curl -fsS http://127.0.0.1:5000/health 2>/dev/null | grep -q '"status":"ok"'; then ok=1; break; fi
          sleep 2
        done
        if [ -z "$ok" ]; then
          echo "manager never became healthy; service state + port owner + logs:"
          brew services list || true
          lsof -nP -i :5000 || true
          tail -n 100 "$(brew --prefix)"/var/log/llm-systems-manager/manager*.log 2>/dev/null || true
          exit 1
        fi
        # First boot must have bootstrapped the internal CA + the AE cert.
        test -f "$(brew --prefix)/var/llm-systems-manager/data/internal-ca.crt"
        test -f "$(brew --prefix)/var/llm-systems-manager/ae-data/ae-tls.crt"

    - name: Alarm engine serves /health
      shell: bash
      run: |
        brew services start llm-systems-alarm-engine
        ok=""
        for _ in $(seq 1 45); do
          if curl -fsk https://127.0.0.1:8081/health 2>/dev/null | grep -q '"status"'; then ok=1; break; fi
          if curl -fs  http://127.0.0.1:8081/health 2>/dev/null | grep -q '"status"'; then ok=1; break; fi
          sleep 2
        done
        if [ -z "$ok" ]; then
          echo "alarm engine never became healthy; service state + logs:"
          brew services list || true
          tail -n 100 "$(brew --prefix)"/var/log/llm-systems-manager/alarm-engine*.log 2>/dev/null || true
          exit 1
        fi

    - name: AE self-restart via management API respawns it (v1.0.8+ — #437)
      shell: bash
      run: |
        ver="$(brew list --versions llm-systems-alarm-engine | awk '{print $2}')"
        case "$ver" in
          1.0.[0-7]) echo "skip: $ver predates the restart-pending non-zero exit"; exit 0 ;;
        esac
        cfg="$(brew --prefix)/etc/llm-systems-manager/llm-systems.toml"
        tok="$(sed -n 's/^management_token = "\(.*\)"$/\1/p' "$cfg" | head -n 1)"
        [ -n "$tok" ] || { echo "no management_token in seeded config"; exit 1; }
        curl -fsk -X POST -H "Authorization: Bearer $tok" https://127.0.0.1:8081/api/alarm/admin/self-restart 2>/dev/null \
          || curl -fs -X POST -H "Authorization: Bearer $tok" http://127.0.0.1:8081/api/alarm/admin/self-restart
        sleep 4
        ok=""
        for _ in $(seq 1 30); do
          if curl -fsk https://127.0.0.1:8081/health 2>/dev/null | grep -q '"status"'; then ok=1; break; fi
          if curl -fs  http://127.0.0.1:8081/health 2>/dev/null | grep -q '"status"'; then ok=1; break; fi
          sleep 2
        done
        if [ -z "$ok" ]; then
          echo "alarm engine never came back after self-restart (Restart=on-failure needs a non-zero exit):"
          brew services list || true
          tail -n 100 "$(brew --prefix)"/var/log/llm-systems-manager/alarm-engine*.log 2>/dev/null || true
          exit 1
        fi

    - name: Stop, brew test, uninstall clean
      shell: bash
      run: |
        brew services stop llm-systems-alarm-engine
        brew services stop llm-systems-manager
        brew services stop influxdb@2 2>/dev/null || true
        brew test llm-systems-manager
        brew test llm-systems-alarm-engine
        brew uninstall llm-systems-alarm-engine llm-systems-manager
        # Config + state must survive uninstall (brew convention).
        test -f "$(brew --prefix)/etc/llm-systems-manager/llm-systems.toml"
